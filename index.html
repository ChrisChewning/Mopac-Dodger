<html lang='en' dir='ltr'>

<head>

  <meta charset='utf-8'>
  <title>Traffic Dodger</title>
  <link href='css/style.css' rel='stylesheet'>
  <link href='https://fonts.googleapis.com/css?family=Press+Start+2P|Raleway' rel='stylesheet'>

  <script src='js/imageVariables.js'></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.3.1/jquery.js"></script>


</head>

<body>
  <header>
    <h1>Traffic Dodger</h1>
      <div id="header-top">                                                       
      <div id="score-timer">
        <h2><span id='player1Score'></span><span id='player2Score'></span></h2> 
        <progress id='progressBar' value='90' max='90' min='0'></progress>      
        <span id='timerDisplay'>90</span>
      </div>                                                                    
      <div id="dpad" role="group" aria-label="Movement controls">
        <button id="btnUp"    aria-label="Move up">▲</button>                   
        <button id="btnLeft"  aria-label="Move left">◄</button>
        <button id="btnDown"  aria-label="Move down">▼</button>                 
        <button id="btnRight" aria-label="Move right">►</button>
      </div>                                                                    
    </div>        
  </header>  
  </header>



  <!-- polite: timer, score, collision -->
  <div id="gameAnnouncer"                                                       
       role="status"     
       aria-live="polite"
       aria-atomic="true"                                                       
       class="sr-only"></div>
                                                                                
  <!-- assertive: game over only -->
  <div id="gameAnnouncerUrgent"     
       role="alert"            
       aria-live="assertive"                                                    
       aria-atomic="true"   
       class="sr-only"></div>   

   <!-- <div id="dpad" role="group" aria-label="Movement controls">
    <button id="btnUp"    aria-label="Move up">▲</button>
    <button id="btnLeft"  aria-label="Move left">◄</button>
    <button id="btnDown"  aria-label="Move down">▼</button>
    <button id="btnRight" aria-label="Move right">►</button>
  </div> -->
  
  <canvas id='canvas' width=1440 height=620
          role="application"
          aria-label="Traffic Dodger game area. Use arrow keys to move the taco
  truck."
          tabindex="0">
  </canvas>

  <footer></footer>

  <div id="container">

    <div class='modal' id='onStartModal'
        role="dialog"
       aria-modal="true"
       aria-labelledby="instructions">
      <h4 id='instructions'>Make it to the other side without crashing!!</h4>
      <button id='onePlayerBtn'>Start</button>
      <!-- <button id='twoPlayerBtn'>2 Players</button> -->
  </div>



  </div>
  <script src='js/app.js' type='text/javascript'></script>


</body>
</html>
